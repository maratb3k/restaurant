services:
  restaurant:
    image: backend:dev
    container_name: restaurant
    ports:
      - "8082:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/postgres
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=postgres

      - MINIO_URL=http://seaweedfs:8333
      - MINIO_ACCESS_KEY=seaweedadmin
      - MINIO_SECRET_KEY=seaweedadmin

      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - KAFKA_TOPIC_REPORTS=restaurant-reports-topic
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
      kafka:
        condition: service_started
  seaweedfs:
    image: chrislusf/seaweedfs:4.33
    ports:
      - "9333:9333"
      - "8080:8080"
      - "8888:8888"
      - "8333:8333"
    volumes:
      - ./seaweedfs-data:/data
      - ./seaweedfs/s3.json:/etc/seaweedfs/s3.json
    command: server -dir=/data -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json
    healthcheck:
      test: [ "CMD-SHELL", "wget -S -O /dev/null http://127.0.0.1:8333/ 2>&1 | grep -qE 'HTTP/1\\.[01] (200|403|404)'" ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  kafka:
    image: apache/kafka:4.2.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./broker/data:/var/lib/kafka/data

volumes:
  postgres_data:
